<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body{font-family:Arial;padding:20px}
table{width:100%;border-collapse:collapse}
td,th{border:1px solid #ddd;padding:10px}
a{color:red}
</style>
</head>
<body>

<h2>📅 Booking Management</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Time</th>
<th>Action</th>
</tr>

{% for b in bookings %}
<tr>
<td>{{b[0]}}</td>
<td>{{b[1]}}</td>
<td>{{b[2]}}</td>
<td>{{b[3]}}</td>
<td><a href="/delete/{{b[0]}}">Delete</a></td>
</tr>
{% endfor %}
</table>

</body>
</html>
