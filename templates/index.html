<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nail Salon AI</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 380px;
    height: 600px;
    background: white;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.header {
    background: #ff4d6d;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

.chat-box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin: 8px 0;
    display: flex;
}

.msg.user {
    justify-content: flex-end;
}

.bubble {
    padding: 10px 14px;
    border-radius: 15px;
    max-width: 70%;
}

.user .bubble {
    background: #007bff;
    color: white;
}

.bot .bubble {
    background: #eee;
}

.input-box {
    display: flex;
    border-top: 1px solid #ddd;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
}

button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 12px 15px;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">💅 Nail Salon AI</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-box">
        <input id="msg" placeholder="Type message...">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
function add(text, type) {
    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "msg " + type;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    div.appendChild(bubble);
    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;
}

function send() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    add(text, "user");

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => {
        add(data.reply, "bot");
    });

    input.value = "";
}

document.getElementById("msg").addEventListener("keypress", function(e){
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
