<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ salon }}</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f7f7f7;
}

.header{
    background:#ff4d6d;
    color:white;
    text-align:center;
    padding:25px;
    font-size:22px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:20px auto;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    width:100%;
    padding:10px;
    background:#ff4d6d;
    color:white;
    border:none;
    border-radius:8px;
}

a.btn{
    display:block;
    text-align:center;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
    text-decoration:none;
    color:white;
}

.call{background:#28a745;}
.map{background:#007bff;}
.msg{background:#6f42c1;}
</style>
</head>

<body>

<div class="header">
💅 {{ salon }}
</div>

<div class="container">

    <div class="card">
        <h3>📍 About Us</h3>
        <p>📍 {{ address }}</p>
        <p>📞 {{ phone }}</p>

        <a class="btn call" href="tel:{{ phone }}">📞 Call Now</a>
        <a class="btn map" href="https://maps.google.com" target="_blank">🗺 Open Map</a>
        <a class="btn msg" href="https://m.me/yourpage" target="_blank">💬 Messenger</a>
    </div>

    <div class="card">
        <h3>📅 Book Appointment</h3>

        <input id="name" placeholder="Name">
        <input id="phone" placeholder="Phone">
        <input id="time" placeholder="Time (e.g. 5pm)">

        <button onclick="book()">Book Now</button>

        <p id="result"></p>
    </div>

</div>

<script>
function book(){
    fetch("/book",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            name:document.getElementById("name").value,
            phone:document.getElementById("phone").value,
            time:document.getElementById("time").value
        })
    })
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("result").innerText = d.msg;
    });
}
</script>

</body>
</html>
